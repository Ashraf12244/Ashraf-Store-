<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن پینل - اشرف اسٹور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    
    <style>
        .sidebar { transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: white; z-index: 1000; transform: translateX(-100%); box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .sidebar.open { transform: translateX(0); }
        }
        .toast-message { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100">

<button id="menuToggle" class="fixed top-4 left-4 z-50 bg-blue-600 text-white p-2 rounded-lg shadow-lg md:hidden">
    <i class="fas fa-bars"></i>
</button>

<!-- Sidebar -->
<div id="sidebar" class="sidebar bg-white shadow-lg w-72 fixed top-0 left-0 h-full z-40">
    <div class="p-5 border-b">
        <div class="flex items-center gap-2">
            <i class="fas fa-store text-2xl text-blue-600"></i>
            <h2 class="text-xl font-bold">اشرف اسٹور</h2>
        </div>
        <p class="text-xs text-gray-500 mt-1">ایڈمن پینل</p>
    </div>
    
    <div id="adminInfo" class="p-4 bg-blue-50 m-3 rounded-xl">
        <div class="flex items-center gap-3">
            <i class="fas fa-user-circle text-3xl text-blue-600"></i>
            <div>
                <p id="adminName" class="font-semibold text-sm">ایڈمن</p>
                <p id="adminEmail" class="text-xs text-gray-500">admin@ashrafstore.com</p>
            </div>
        </div>
    </div>
    
    <nav class="p-3">
        <button onclick="showSection('dashboard')" id="navDashboard" class="w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 bg-blue-50 text-blue-600">
            <i class="fas fa-chart-line w-5"></i> ڈیش بورڈ
        </button>
        <button onclick="showSection('products')" id="navProducts" class="w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 text-gray-600 hover:bg-gray-100">
            <i class="fas fa-box w-5"></i> پروڈکٹس
        </button>
        <button onclick="showSection('addProduct')" id="navAddProduct" class="w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 text-gray-600 hover:bg-gray-100">
            <i class="fas fa-plus-circle w-5"></i> نیا پروڈکٹ
        </button>
        <button onclick="showSection('orders')" id="navOrders" class="w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 text-gray-600 hover:bg-gray-100">
            <i class="fas fa-truck w-5"></i> آرڈرز
        </button>
        <a href="index.html" class="w-full text-left p-3 rounded-xl mt-5 flex items-center gap-3 text-red-600 hover:bg-red-50">
            <i class="fas fa-sign-out-alt w-5"></i> ویب سائٹ پر جائیں
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="md:ml-72 min-h-screen">
    <div class="bg-white shadow-sm p-4 sticky top-0 z-30">
        <h1 id="pageTitle" class="text-xl font-bold">ڈیش بورڈ</h1>
    </div>
    
    <div id="contentArea" class="p-6">
        <div id="dashboardSection">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white rounded-xl p-6 shadow-sm"><div class="flex justify-between"><div><p class="text-gray-500">کل پروڈکٹس</p><p id="totalProducts" class="text-3xl font-bold">0</p></div><i class="fas fa-box text-4xl text-blue-500"></i></div></div>
                <div class="bg-white rounded-xl p-6 shadow-sm"><div class="flex justify-between"><div><p class="text-gray-500">کل آرڈرز</p><p id="totalOrders" class="text-3xl font-bold">0</p></div><i class="fas fa-shopping-cart text-4xl text-green-500"></i></div></div>
                <div class="bg-white rounded-xl p-6 shadow-sm"><div class="flex justify-between"><div><p class="text-gray-500">کم اسٹاک</p><p id="lowStock" class="text-3xl font-bold text-red-500">0</p></div><i class="fas fa-exclamation-triangle text-4xl text-red-500"></i></div></div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm"><h3 class="font-bold mb-4">⚠️ کم اسٹاک والی پروڈکٹس</h3><div id="lowStockList"></div></div>
        </div>
        
        <div id="productsSection" class="hidden">
            <div class="bg-white rounded-xl shadow-sm">
                <div class="p-4 border-b"><input type="text" id="searchProduct" placeholder="پروڈکٹ تلاش کریں..." class="w-full max-w-md px-4 py-2 border rounded-xl"></div>
                <div id="productsTable" class="p-4 overflow-x-auto"></div>
            </div>
        </div>
        
        <div id="addProductSection" class="hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl">
                <h2 class="text-xl font-bold mb-4">نیا پروڈکٹ شامل کریں</h2>
                <form id="productForm">
                    <div class="mb-4"><label class="block text-sm font-medium mb-1">پروڈکٹ کا نام *</label><input type="text" id="prodName" required class="w-full border rounded-xl p-3"></div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div><label class="block text-sm font-medium mb-1">کیٹیگری *</label><select id="prodCategory" required class="w-full border rounded-xl p-3"><option value="groceries">گروسری</option><option value="electronics">الیکٹرونکس</option><option value="clothing">کپڑے</option><option value="home">گھر کا سامان</option></select></div>
                        <div><label class="block text-sm font-medium mb-1">اسٹاک *</label><input type="number" id="prodStock" required class="w-full border rounded-xl p-3"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div><label class="block text-sm font-medium mb-1">اصل قیمت (₹)</label><input type="number" id="prodPrice" required class="w-full border rounded-xl p-3"></div>
                        <div><label class="block text-sm font-medium mb-1">چھوٹ والی قیمت</label><input type="number" id="prodDiscount" class="w-full border rounded-xl p-3"></div>
                    </div>
                    <div class="mb-4"><label class="block text-sm font-medium mb-1">تصویر کا لنک</label><input type="text" id="prodImage" class="w-full border rounded-xl p-3" placeholder="https://example.com/image.jpg"></div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">پروڈکٹ محفوظ کریں</button>
                </form>
            </div>
        </div>
        
        <div id="ordersSection" class="hidden">
            <div class="bg-white rounded-xl shadow-sm p-4"><div id="ordersList"></div></div>
        </div>
    </div>
</div>

<div id="toastContainer" class="fixed top-20 right-4 z-50"></div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyDeonBkHpaKn84kG-7jQN3vXV5vV7g1dUY",
    authDomain: "sharifcom-45d95.firebaseapp.com",
    databaseURL: "https://sharifcom-45d95-default-rtdb.firebaseio.com",
    projectId: "sharifcom-45d95",
    storageBucket: "sharifcom-45d95.firebasestorage.app",
    messagingSenderId: "273914972899",
    appId: "1:273914972899:web:040c90d0e6b38ee864d3d6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let products = [];

// Auth Check
auth.onAuthStateChanged((user) => {
    if (user) {
        db.ref(`users/${user.uid}/role`).once('value', (snapshot) => {
            if (snapshot.val() === 'admin') {
                currentUser = user;
                document.getElementById('adminName').textContent = user.displayName || 'Admin';
                document.getElementById('adminEmail').textContent = user.email;
                showSection('dashboard');
            } else {
                showToast('آپ کے پاس ایڈمن رسائی نہیں ہے', 'error');
                window.location.href = 'index.html';
            }
        });
    } else {
        window.location.href = 'index.html';
    }
});

function showSection(section) {
    document.getElementById('dashboardSection').classList.add('hidden');
    document.getElementById('productsSection').classList.add('hidden');
    document.getElementById('addProductSection').classList.add('hidden');
    document.getElementById('ordersSection').classList.add('hidden');
    document.getElementById(`${section}Section`).classList.remove('hidden');
    
    const navs = ['dashboard', 'products', 'addProduct', 'orders'];
    navs.forEach(n => {
        const btn = document.getElementById(`nav${n.charAt(0).toUpperCase() + n.slice(1)}`);
        if (btn) {
            if (n === section) {
                btn.className = 'w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 bg-blue-50 text-blue-600';
            } else {
                btn.className = 'w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 text-gray-600 hover:bg-gray-100';
            }
        }
    });
    
    if (section === 'dashboard') updateDashboard();
    if (section === 'products') loadProductsTable();
    if (section === 'orders') loadOrders();
}

function updateDashboard() {
    db.ref('products').on('value', (snapshot) => {
        let total = 0;
        let lowStockCount = 0;
        let lowStockList = [];
        snapshot.forEach((child) => {
            total++;
            const p = child.val();
            if (p.stock < 20) {
                lowStockCount++;
                lowStockList.push({ id: child.key, ...p });
            }
        });
        document.getElementById('totalProducts').textContent = total;
        document.getElementById('lowStock').textContent = lowStockCount;
        
        const container = document.getElementById('lowStockList');
        if (lowStockList.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-center py-4">کم اسٹاک والی کوئی پروڈکٹ نہیں</p>';
        } else {
            container.innerHTML = lowStockList.map(p => `
                <div class="flex justify-between items-center p-3 bg-red-50 rounded-lg mb-2">
                    <div><p class="font-semibold">${p.name}</p><p class="text-sm text-red-600">اسٹاک: ${p.stock}</p></div>
                    <button onclick="editProduct('${p.id}')" class="text-blue-600">اپ ڈیٹ</button>
                </div>
            `).join('');
        }
    });
    
    db.ref('orders').on('value', (snapshot) => {
        let count = 0;
        snapshot.forEach((userOrders) => { userOrders.forEach(() => count++); });
        document.getElementById('totalOrders').textContent = count;
    });
}

function loadProductsTable() {
    db.ref('products').on('value', (snapshot) => {
        products = [];
        snapshot.forEach((child) => {
            products.push({ id: child.key, ...child.val() });
        });
        renderProductsTable(products);
    });
}

function renderProductsTable(productsList) {
    const container = document.getElementById('productsTable');
    if (productsList.length === 0) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400">کوئی پروڈکٹ نہیں</div>';
        return;
    }
    
    container.innerHTML = `
        <table class="w-full">
            <thead class="bg-gray-50"><tr><th class="p-3 text-left">پروڈکٹ</th><th class="p-3 text-left">قیمت</th><th class="p-3 text-left">اسٹاک</th><th class="p-3 text-left">عمل</th></tr></thead>
            <tbody>
                ${productsList.map(p => `
                    <tr class="border-b">
                        <td class="p-3"><div class="flex items-center gap-3"><img src="${p.image || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded object-cover"><span>${p.name}</span></div></td>
                        <td class="p-3">₹${p.discount || p.price}</td>
                        <td class="p-3">${p.stock}</td>
                        <td class="p-3"><button onclick="deleteProduct('${p.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
    
    document.getElementById('searchProduct').addEventListener('input', (e) => {
        const filtered = products.filter(p => p.name.toLowerCase().includes(e.target.value.toLowerCase()));
        renderProductsTable(filtered);
    });
}

function deleteProduct(productId) {
    if (confirm('کیا آپ یہ پروڈکٹ ڈیلیٹ کرنا چاہتے ہیں؟')) {
        db.ref(`products/${productId}`).remove().then(() => {
            showToast('پروڈکٹ ڈیلیٹ ہو گئی!');
            loadProductsTable();
            updateDashboard();
        });
    }
}

document.getElementById('productForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const newProduct = {
        name: document.getElementById('prodName').value,
        category: document.getElementById('prodCategory').value,
        price: parseInt(document.getElementById('prodPrice').value),
        discount: parseInt(document.getElementById('prodDiscount').value) || parseInt(document.getElementById('prodPrice').value),
        stock: parseInt(document.getElementById('prodStock').value),
        image: document.getElementById('prodImage').value || 'https://via.placeholder.com/300',
        rating: 4.0,
        reviews: 0,
        createdAt: new Date().toISOString()
    };
    
    db.ref('products').push(newProduct).then(() => {
        showToast('پروڈکٹ شامل ہو گئی!');
        document.getElementById('productForm').reset();
        showSection('products');
    }).catch(e => showToast('خرابی: ' + e.message, 'error'));
});

function loadOrders() {
    db.ref('orders').on('value', (snapshot) => {
        const orders = [];
        snapshot.forEach((userOrders) => {
            userOrders.forEach((order) => {
                orders.push({ id: order.key, userId: userOrders.key, ...order.val() });
            });
        });
        
        const container = document.getElementById('ordersList');
        if (orders.length === 0) {
            container.innerHTML = '<div class="text-center py-10 text-gray-400">کوئی آرڈر نہیں</div>';
            return;
        }
        
        container.innerHTML = orders.map(order => `
            <div class="border rounded-xl p-4 mb-3">
                <div class="flex justify-between mb-3">
                    <div><p class="font-bold">آرڈر #${order.orderId}</p><p class="text-sm text-gray-500">${new Date(order.createdAt).toLocaleString()}</p></div>
                    <select onchange="updateOrderStatus('${order.id}', '${order.userId}', this.value)" class="px-3 py-1 rounded-full text-sm border ${order.status === 'pending' ? 'bg-yellow-100' : 'bg-green-100'}">
                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>زیر التواء</option>
                        <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>کنفرم</option>
                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>ڈلیورڈ</option>
                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>منسوخ</option>
                    </select>
                </div>
                <div class="border-t pt-3">${order.items.map(i => `<div class="flex justify-between text-sm mb-1"><span>${i.name} x${i.quantity}</span><span>₹${i.price * i.quantity}</span></div>`).join('')}</div>
                <div class="border-t pt-3 mt-2 flex justify-between"><span class="font-bold">کل:</span><span class="font-bold text-blue-600">₹${order.total}</span></div>
                <div class="mt-2 text-xs text-gray-400"><i class="fas fa-map-marker-alt"></i> ${order.address}</div>
            </div>
        `).join('');
    });
}

function updateOrderStatus(orderId, userId, status) {
    db.ref(`orders/${userId}/${orderId}/status`).set(status).then(() => {
        showToast('آرڈر کی حالت تبدیل ہو گئی!');
    });
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `px-4 py-3 rounded-xl shadow-lg toast-message mb-2 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`;
    toast.innerText = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Mobile menu toggle
document.getElementById('menuToggle')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// Make functions global
window.showSection = showSection;
window.deleteProduct = deleteProduct;
window.updateOrderStatus = updateOrderStatus;
</script>
</body>
</html>

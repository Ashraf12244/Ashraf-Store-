<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ایڈمن پینل - اشرف اسٹور</title>

    <!-- Font Awesome -->

    <!-- Chart.js for Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    
    <style>
        /* Custom styles */
        .sidebar {
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                background: white;
                z-index: 1000;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        
        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        /* Image preview */
        .image-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast animation */
        .toast {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyDeonBkHpaKn84kG-7jQN3vXV5vV7g1dUY",
    authDomain: "sharifcom-45d95.firebaseapp.com",
    databaseURL: "https://sharifcom-45d95-default-rtdb.firebaseio.com",
    projectId: "sharifcom-45d95",
    storageBucket: "sharifcom-45d95.firebasestorage.app",
    messagingSenderId: "273914972899",
    appId: "1:273914972899:web:040c90d0e6b38ee864d3d6"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

// ==================== GLOBAL VARIABLES ====================
let currentUser = null;
let productsList = [];
let usersList = [];
let ordersList = [];
let deleteProductId = null;
let currentChart = null;

// ==================== AUTHENTICATION CHECK ====================
auth.onAuthStateChanged((user) => {
    if (user) {
        // Check if user is admin
        database.ref(`users/${user.uid}/role`).once('value', (snapshot) => {
            if (snapshot.val() === 'admin') {
                currentUser = user;
                document.getElementById('adminName').textContent = user.displayName || 'Admin';
                document.getElementById('adminEmail').textContent = user.email;
                showDashboard();
            } else {
                showToast('آپ کے پاس ایڈمن رسائی نہیں ہے', 'error');
                window.location.href = '/index.html';
            }
        });
    } else {
        // Redirect to login
        window.location.href = '/index.html';
    }
});

// ==================== DASHBOARD ====================
function showDashboard() {
    updateNavActive('navDashboard');
    document.getElementById('pageTitle').innerHTML = '📊 ڈیش بورڈ';
    
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 shadow-sm card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">کل پروڈکٹس</p>
                        <p id="totalProducts" class="text-2xl font-bold">0</p>
                    </div>
                    <i class="fas fa-box text-3xl text-blue-500"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">کل یوزرز</p>
                        <p id="totalUsers" class="text-2xl font-bold">0</p>
                    </div>
                    <i class="fas fa-users text-3xl text-green-500"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">کل آرڈرز</p>
                        <p id="totalOrders" class="text-2xl font-bold">0</p>
                    </div>
                    <i class="fas fa-shopping-cart text-3xl text-orange-500"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">لو اسٹاک</p>
                        <p id="lowStockCount" class="text-2xl font-bold text-red-500">0</p>
                    </div>
                    <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl p-4 shadow-sm mb-6">
            <h3 class="font-bold mb-4">آرڈرز کا رجحان</h3>
            <canvas id="ordersChart" height="200"></canvas>
        </div>
        
        <div class="bg-white rounded-xl p-4 shadow-sm">
            <h3 class="font-bold mb-4">⚠️ کم اسٹاک الرٹ</h3>
            <div id="lowStockList" class="space-y-2"></div>
        </div>
    `;
    
    loadDashboardData();
}

function loadDashboardData() {
    // Count products
    database.ref('products').on('value', (snapshot) => {
        let total = 0;
        let lowStock = 0;
        const lowStockList = [];
        
        snapshot.forEach((child) => {
            total++;
            const product = child.val();
            if (product.stock <= 10) {
                lowStock++;
                lowStockList.push({ id: child.key, ...product });
            }
        });
        
        document.getElementById('totalProducts').textContent = total;
        document.getElementById('lowStockCount').textContent = lowStock;
        
        // Show low stock list
        const lowStockDiv = document.getElementById('lowStockList');
        if (lowStockList.length > 0) {
            lowStockDiv.innerHTML = lowStockList.map(p => `
                <div class="flex justify-between items-center p-3 bg-red-50 rounded-lg">
                    <div>
                        <p class="font-semibold">${p.name}</p>
                        <p class="text-sm text-red-600">اسٹاک: ${p.stock} عدد</p>
                    </div>
                    <button onclick="editProduct('${p.id}')" class="text-blue-600 text-sm">اپ ڈیٹ کریں</button>
                </div>
            `).join('');
        } else {
            lowStockDiv.innerHTML = '<p class="text-gray-400 text-center py-4">کم اسٹاک والی کوئی پروڈکٹ نہیں</p>';
        }
    });
    
    // Count users
    database.ref('users').on('value', (snapshot) => {
        let count = 0;
        snapshot.forEach(() => count++);
        document.getElementById('totalUsers').textContent = count;
    });
    
    // Count orders
    database.ref('orders').on('value', (snapshot) => {
        let count = 0;
        snapshot.forEach((userOrders) => {
            userOrders.forEach(() => count++);
        });
        document.getElementById('totalOrders').textContent = count;
    });
    
    // Orders chart
    loadOrdersChart();
}

function loadOrdersChart() {
    const ctx = document.getElementById('ordersChart');
    if (!ctx) return;
    
    // Get last 7 days orders
    const last7Days = [];
    for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        last7Days.push(date.toLocaleDateString('ur'));
    }
    
    database.ref('orders').once('value', (snapshot) => {
        const dailyCounts = new Array(7).fill(0);
        
        snapshot.forEach((userOrders) => {
            userOrders.forEach((order) => {
                const orderDate = new Date(order.val().createdAt);
                const today = new Date();
                const diffDays = Math.floor((today - orderDate) / (1000 * 60 * 60 * 24));
                if (diffDays >= 0 && diffDays < 7) {
                    dailyCounts[6 - diffDays]++;
                }
            });
        });
        
        if (currentChart) currentChart.destroy();
        
        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last7Days,
                datasets: [{
                    label: 'آرڈرز',
                    data: dailyCounts,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    });
}

// ==================== PRODUCTS MANAGEMENT ====================
function showProducts() {
    updateNavActive('navProducts');
    document.getElementById('pageTitle').innerHTML = '📦 پروڈکٹس مینجمنٹ';
    
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm">
            <div class="p-4 border-b flex justify-between items-center">
                <div class="relative flex-1 max-w-md">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchProduct" placeholder="پروڈکٹ تلاش کریں..." class="w-full pl-10 pr-4 py-2 border rounded-xl">
                </div>
                <button onclick="showAddProduct()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm">
                    <i class="fas fa-plus"></i> نیا پروڈکٹ
                </button>
            </div>
            <div id="productsTable" class="overflow-x-auto p-4">
                <div class="flex justify-center py-10"><div class="spinner"></div></div>
            </div>
        </div>
    `;
    
    loadProductsTable();
    
    document.getElementById('searchProduct').addEventListener('input', (e) => {
        filterProducts(e.target.value);
    });
}

function loadProductsTable() {
    database.ref('products').on('value', (snapshot) => {
        productsList = [];
        snapshot.forEach((child) => {
            productsList.push({ id: child.key, ...child.val() });
        });
        renderProductsTable(productsList);
    });
}

function renderProductsTable(products) {
    const container = document.getElementById('productsTable');
    
    if (products.length === 0) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400">کوئی پروڈکٹ نہیں</div>';
        return;
    }
    
    container.innerHTML = `
        <table class="w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="p-3 text-left text-sm">پروڈکٹ</th>
                    <th class="p-3 text-left text-sm">قیمت</th>
                    <th class="p-3 text-left text-sm">اسٹاک</th>
                    <th class="p-3 text-left text-sm">کیٹیگری</th>
                    <th class="p-3 text-left text-sm">عمل</th>
                </tr>
            </thead>
            <tbody>
                ${products.map(product => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3">
                            <div class="flex items-center gap-3">
                                <img src="${product.image || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded object-cover">
                                <div>
                                    <p class="font-medium">${product.name}</p>
                                    <p class="text-xs text-gray-400">ID: ${product.id.substring(0, 8)}</p>
                                </div>
                            </div>
                        </td>
                        <td class="p-3">
                            <span class="font-bold">₹${product.discount_price || product.price}</span>
                            ${product.discount_price ? `<span class="text-xs line-through text-gray-400 block">₹${product.price}</span>` : ''}
                        </td>
                        <td class="p-3">
                            <span class="${product.stock <= 10 ? 'text-red-600 font-bold' : 'text-green-600'}">
                                ${product.stock}
                            </span>
                        </td>
                        <td class="p-3">
                            <span class="px-2 py-1 bg-gray-100 rounded-full text-xs">${product.category}</span>
                        </td>
                        <td class="p-3">
                            <button onclick="editProduct('${product.id}')" class="text-blue-600 mr-2">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteProductPrompt('${product.id}')" class="text-red-600">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function filterProducts(searchTerm) {
    const filtered = productsList.filter(p => 
        p.name.toLowerCase().includes(searchTerm.toLowerCase())
    );
    renderProductsTable(filtered);
}

    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl mx-auto">
            <form id="addProductForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">پروڈکٹ کا نام *</label>
                    <input type="text" id="prodName" required class="w-full border rounded-xl p-3">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">کیٹیگری *</label>
                    <select id="prodCategory" required class="w-full border rounded-xl p-3">
                        <option value="">انتخاب کریں</option>
                        <option value="groceries">گروسری</option>
                        <option value="electronics">الیکٹرونکس</option>
                        <option value="clothing">کپڑے</option>
                        <option value="home">گھر کا سامان</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">اصل قیمت (₹) *</label>
                        <input type="number" id="prodPrice" required class="w-full border rounded-xl p-3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">چھوٹ والی قیمت</label>
                        <input type="number" id="prodDiscountPrice" class="w-full border rounded-xl p-3">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">اسٹاک *</label>
                        <input type="number" id="prodStock" required class="w-full border rounded-xl p-3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">ریٹنگ</label>
                        <input type="number" id="prodRating" step="0.1" value="4.0" class="w-full border rounded-xl p-3">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">تصویر کا لنک</label>
                    <input type="text" id="prodImage" class="w-full border rounded-xl p-3" placeholder="https://example.com/image.jpg">
                    <div id="prodImagePreview" class="mt-2 hidden">
                        <img id="prodPreviewImg" class="image-preview">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">تفصیل</label>
                    <textarea id="prodDescription" rows="3" class="w-full border rounded-xl p-3"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">
                    <i class="fas fa-save"></i> پروڈکٹ محفوظ کریں
                </button>
            </form>
        </div>
    `;
    
    document.getElementById('addProductForm').addEventListener('submit', (e) => {
        e.preventDefault();
        addNewProduct();
    });
    
    document.getElementById('prodImage').addEventListener('input', (e) => {
        const url = e.target.value;
        if (url) {
            document.getElementById('prodImagePreview').classList.remove('hidden');
            document.getElementById('prodPreviewImg').src = url;
        } else {
            document.getElementById('prodImagePreview').classList.add('hidden');
        }
    });
}

function addNewProduct() {
    const productData = {
        name: document.getElementById('prodName').value,
        category: document.getElementById('prodCategory').value,
        price: parseInt(document.getElementById('prodPrice').value),
        discount_price: parseInt(document.getElementById('prodDiscountPrice').value) || null,
        stock: parseInt(document.getElementById('prodStock').value),
        rating: parseFloat(document.getElementById('prodRating').value),
        image: document.getElementById('prodImage').value || null,
        description: document.getElementById('prodDescription').value || '',
        reviews: 0,
        createdAt: new Date().toISOString()
    };
    
    database.ref('products').push(productData).then(() => {
        showToast('پروڈکٹ کامیابی سے شامل ہو گئی!', 'success');
        showProducts();
    }).catch((error) => {
        showToast('خرابی: ' + error.message, 'error');
    });
}

function editProduct(productId) {
    database.ref(`products/${productId}`).once('value', (snapshot) => {
        const product = snapshot.val();
        
        document.getElementById('modalTitle').innerHTML = '✏️ پروڈکٹ میں ترمیم کریں';
        document.getElementById('productId').value = productId;
        document.getElementById('productName').value = product.name || '';
        document.getElementById('productCategory').value = product.category || '';
        document.getElementById('productPrice').value = product.price || '';
        document.getElementById('productDiscountPrice').value = product.discount_price || '';
        document.getElementById('productStock').value = product.stock || '';
        document.getElementById('productRating').value = product.rating || 4;
        document.getElementById('productDescription').value = product.description || '';
        
        if (product.image) {
            document.getElementById('imagePreview').classList.remove('hidden');
            document.getElementById('previewImg').src = product.image;
        }
        
        document.getElementById('productModal').classList.remove('hidden');
    });
}

function saveProduct() {
    const productId = document.getElementById('productId').value;
    const productData = {
        name: document.getElementById('productName').value,
        category: document.getElementById('productCategory').value,
        price: parseInt(document.getElementById('productPrice').value),
        discount_price: parseInt(document.getElementById('productDiscountPrice').value) || null,
        stock: parseInt(document.getElementById('productStock').value),
        rating: parseFloat(document.getElementById('productRating').value),
        description: document.getElementById('productDescription').value,
        updatedAt: new Date().toISOString()
    };
    
    database.ref(`products/${productId}`).update(productData).then(() => {
        showToast('پروڈکٹ اپ ڈیٹ ہو گئی!', 'success');
        closeProductModal();
        showProducts();
    }).catch((error) => {
        showToast('خرابی: ' + error.message, 'error');
    });
}

function deleteProductPrompt(productId) {
    deleteProductId = productId;
    document.getElementById('deleteModal').classList.remove('hidden');
}

function confirmDelete() {
    if (deleteProductId) {
        database.ref(`products/${deleteProductId}`).remove().then(() => {
            showToast('پروڈکٹ ڈیلیٹ ہو گئی!', 'success');
            closeDeleteModal();
            showProducts();
        }).catch((error) => {
            showToast('خرابی: ' + error.message, 'error');
        });
    }
}

// ==================== USERS MANAGEMENT ====================
function showUsers() {
    updateNavActive('navUsers');
    document.getElementById('pageTitle').innerHTML = '👥 یوزرز مینجمنٹ';
    
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm">
            <div class="p-4 border-b">
                <div class="relative max-w-md">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchUser" placeholder="یوزر تلاش کریں..." class="w-full pl-10 pr-4 py-2 border rounded-xl">
                </div>
            </div>
            <div id="usersList" class="p-4">
                <div class="flex justify-center py-10"><div class="spinner"></div></div>
            </div>
        </div>
    `;
    
    loadUsers();
}

function loadUsers() {
    database.ref('users').on('value', (snapshot) => {
        usersList = [];
        snapshot.forEach((child) => {
            usersList.push({ id: child.key, ...child.val() });
        });
        renderUsers(usersList);
    });
}

function renderUsers(users) {
    const container = document.getElementById('usersList');
    
    if (users.length === 0) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400">کوئی یوزر نہیں</div>';
        return;
    }
    
    container.innerHTML = users.map(user => `
        <div class="flex justify-between items-center p-4 border-b hover:bg-gray-50">
            <div class="flex items-center gap-3">
                <img src="${user.photo || 'https://ui-avatars.com/api/?background=3b82f6&color=fff&name=' + (user.name || 'User')}" class="w-12 h-12 rounded-full object-cover">
                <div>
                    <p class="font-semibold">${user.name || 'نامعلوم'}</p>
                    <p class="text-sm text-gray-500">${user.email || ''}</p>
                    <p class="text-xs text-gray-400">جوائن: ${new Date(user.lastLogin || Date.now()).toLocaleDateString()}</p>
                </div>
            </div>
            <div>
                <span class="px-3 py-1 rounded-full text-xs ${user.role === 'admin' ? 'bg-purple-100 text-purple-600' : 'bg-gray-100'}">
                    ${user.role === 'admin' ? 'ایڈمن' : 'یوزر'}
                </span>
                ${user.role !== 'admin' ? `
                    <button onclick="makeAdmin('${user.id}')" class="ml-2 text-blue-600 text-sm">
                        ایڈمن بنائیں
                    </button>
                ` : ''}
            </div>
        </div>
    `).join('');
    
    document.getElementById('searchUser').addEventListener('input', (e) => {
        const filtered = usersList.filter(u => 
            (u.name && u.name.toLowerCase().includes(e.target.value.toLowerCase())) ||
            (u.email && u.email.toLowerCase().includes(e.target.value.toLowerCase()))
        );
        renderUsers(filtered);
    });
}

function makeAdmin(userId) {
    database.ref(`users/${userId}/role`).set('admin').then(() => {
        showToast('یوزر کو ایڈمن بنا دیا گیا!', 'success');
        loadUsers();
    });
}

// ==================== ORDERS MANAGEMENT ====================
function showOrders() {
    updateNavActive('navOrders');
    document.getElementById('pageTitle').innerHTML = '🚚 آرڈرز مینجمنٹ';
    
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm">
            <div class="p-4 border-b">
                <div class="flex gap-3 overflow-x-auto">
                    <button onclick="filterOrders('all')" id="filterAll" class="px-4 py-2 rounded-full bg-blue-600 text-white text-sm">سب</button>
                    <button onclick="filterOrders('pending')" id="filterPending" class="px-4 py-2 rounded-full bg-gray-200 text-sm">زیر التواء</button>
                    <button onclick="filterOrders('confirmed')" id="filterConfirmed" class="px-4 py-2 rounded-full bg-gray-200 text-sm">کنفرم</button>
                    <button onclick="filterOrders('shipped')" id="filterShipped" class="px-4 py-2 rounded-full bg-gray-200 text-sm">شپڈ</button>
                    <button onclick="filterOrders('delivered')" id="filterDelivered" class="px-4 py-2 rounded-full bg-gray-200 text-sm">ڈلیورڈ</button>
                    <button onclick="filterOrders('cancelled')" id="filterCancelled" class="px-4 py-2 rounded-full bg-gray-200 text-sm">منسوخ</button>
                </div>
            </div>
            <div id="ordersList" class="p-4">
                <div class="flex justify-center py-10"><div class="spinner"></div></div>
            </div>
        </div>
    `;
    
    loadOrders();
}

let currentOrderFilter = 'all';

function loadOrders() {
    database.ref('orders').on('value', (snapshot) => {
        ordersList = [];
        snapshot.forEach((userOrders) => {
            userOrders.forEach((order) => {
                ordersList.push({ id: order.key, userId: userOrders.key, ...order.val() });
            });
        });
        filterOrders(currentOrderFilter);
    });
}

function filterOrders(status) {
    currentOrderFilter = status;
    
    // Update button styles
    const filters = ['all', 'pending', 'confirmed', 'shipped', 'delivered', 'cancelled'];
    filters.forEach(f => {
        const btn = document.getElementById(`filter${f.charAt(0).toUpperCase() + f.slice(1)}`);
        if (btn) {
            if (f === status) {
                btn.className = 'px-4 py-2 rounded-full bg-blue-600 text-white text-sm';
            } else {
                btn.className = 'px-4 py-2 rounded-full bg-gray-200 text-sm';
            }
        }
    });
    
    let filtered = ordersList;
    if (status !== 'all') {
        filtered = ordersList.filter(o => o.status === status);
    }
    
    renderOrders(filtered);
}

function renderOrders(orders) {
    const container = document.getElementById('ordersList');
    
    if (orders.length === 0) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400">کوئی آرڈر نہیں</div>';
        return;
    }
    
    container.innerHTML = orders.map(order => `
        <div class="border rounded-xl p-4 mb-3">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <p class="font-bold">آرڈر #${order.orderId || order.id.substring(0, 8)}</p>
                    <p class="text-sm text-gray-500">${order.userName || order.userEmail || 'یوزر'}</p>
                    <p class="text-xs text-gray-400">${new Date(order.createdAt).toLocaleString()}</p>
                </div>
                <div class="text-right">
                    <select onchange="updateOrderStatus('${order.id}', this.value)" class="px-3 py-1 rounded-full text-sm border ${getStatusColor(order.status)}">
                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ زیر التواء</option>
                        <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>✅ کنفرم</option>
                        <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>🚚 شپڈ</option>
                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>📦 ڈلیورڈ</option>
                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ منسوخ</option>
                    </select>
                </div>
            </div>
            
            <div class="border-t pt-3">
                ${order.items ? order.items.map(item => `
                    <div class="flex justify-between text-sm mb-2">
                        <span>${item.name} x ${item.quantity}</span>
                        <span>₹${item.price * item.quantity}</span>
                    </div>
                `).join('') : '<p class="text-sm text-gray-400">آئٹمز دستیاب نہیں</p>'}
            </div>
            
            <div class="border-t pt-3 mt-2 flex justify-between">
                <span class="font-bold">کل رقم:</span>
                <span class="font-bold text-blue-600">₹${order.total || 0}</span>
            </div>
            
            <div class="mt-2 text-xs text-gray-400">
                <p><i class="fas fa-map-marker-alt"></i> ${order.address || 'پتہ نہیں'}</p>
                ${order.note ? `<p><i class="fas fa-comment"></i> ${order.note}</p>` : ''}
            </div>
        </div>
    `).join('');
}

function getStatusColor(status) {
    switch(status) {
        case 'pending': return 'bg-yellow-100 text-yellow-700';
        case 'confirmed': return 'bg-blue-100 text-blue-700';
        case 'shipped': return 'bg-purple-100 text-purple-700';
        case 'delivered': return 'bg-green-100 text-green-700';
        case 'cancelled': return 'bg-red-100 text-red-700';
        default: return 'bg-gray-100';
    }
}

function updateOrderStatus(orderId, status) {
    // Find which user this order belongs to
    let orderPath = null;
    for (let order of ordersList) {
        if (order.id === orderId) {
            orderPath = `orders/${order.userId}/${orderId}`;
            break;
        }
    }
    
    if (orderPath) {
        database.ref(`${orderPath}/status`).set(status).then(() => {
            showToast('آرڈر کی حالت تبدیل ہو گئی!', 'success');
        });
    }
}

// ==================== COUPONS MANAGEMENT ====================
function showCoupons() {
    updateNavActive('navCoupons');
    document.getElementById('pageTitle').innerHTML = '🎫 کوپنز مینجمنٹ';
    
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm p-6">
            <button onclick="addCoupon()" class="bg-green-600 text-white px-4 py-2 rounded-xl mb-4">
                <i class="fas fa-plus"></i> نیا کوپن
            </button>
            <div id="couponsList" class="space-y-3">
                <div class="flex justify-center py-10"><div class="spinner"></div></div>
            </div>
        </div>
    `;
    
    loadCoupons();
}

function loadCoupons() {
    database.ref('coupons').on('value', (snapshot) => {
        const coupons = [];
        snapshot.forEach((child) => {
            coupons.push({ id: child.key, ...child.val() });
        });
        
        const container = document.getElementById('couponsList');
        if (coupons.length === 0) {
            container.innerHTML = '<div class="text-center py-10 text-gray-400">کوئی کوپن نہیں</div>';
            return;
        }
        
        container.innerHTML = coupons.map(coupon => `
            <div class="border rounded-xl p-4 flex justify-between items-center">
                <div>
                    <p class="font-bold text-lg">${coupon.code}</p>
                    <p class="text-sm">${coupon.discount_type === 'percentage' ? coupon.discount_value + '%' : '₹' + coupon.discount_value} چھوٹ</p>
                    <p class="text-xs text-gray-400">میں آرڈر: ₹${coupon.min_order_amount || 0} | ختم: ${new Date(coupon.expiry_date).toLocaleDateString()}</p>
                </div>
                <button onclick="deleteCoupon('${coupon.id}')" class="text-red-600">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        `).join('');
    });
}

function addCoupon() {
    const code = prompt("کوپن کوڈ لکھیں (مثلاً: SAVE20):");
    if (!code) return;
    
    const discount = prompt("چھوٹ کی مقدار (مثلاً: 10 یا 100):");
    if (!discount) return;
    
    const discountType = confirm("فیصد چھوٹ؟ OK کریں ورنہ Cancel کریں") ? 'percentage' : 'fixed';
    const minOrder = prompt("کم از کم آرڈر ویلیو (0 اگر نہیں):", "0");
    const expiry = prompt("ختم ہونے کی تاریخ (YYYY-MM-DD):");
    
    const couponData = {
        code: code.toUpperCase(),
        discount_type: discountType,
        discount_value: parseFloat(discount),
        min_order_amount: parseFloat(minOrder),
        expiry_date: expiry,
        used_count: 0
    };
    
    database.ref('coupons').push(couponData).then(() => {
        showToast('کوپن شامل ہو گیا!', 'success');
    });
}

function deleteCoupon(couponId) {
    if (confirm("کیا آپ یہ کوپن ڈیلیٹ کرنا چاہتے ہیں؟")) {
        database.ref(`coupons/${couponId}`).remove().then(() => {
            showToast('کوپن ڈیلیٹ ہو گیا!', 'success');
        });
    }
}

// ==================== HELPER FUNCTIONS ====================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `px-4 py-3 rounded-xl shadow-lg toast ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white max-w-sm`;
    toast.innerHTML = `<div class="flex items-center gap-2"><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span></div>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function updateNavActive(activeId) {
    const navs = ['navDashboard', 'navProducts', 'navAddProduct', 'navUsers', 'navOrders', 'navCoupons'];
    navs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            if (id === activeId) {
                el.className = 'w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 bg-blue-50 text-blue-600';
            } else {
                el.className = 'w-full text-left p-3 rounded-xl mb-1 flex items-center gap-3 text-gray-600 hover:bg-gray-100';
            }
        }
    });
}

function refreshData() {
    showToast('ڈیٹا ریفریش ہو رہا ہے...', 'success');
    if (document.getElementById('productsTable')) loadProductsTable();
    if (document.getElementById('usersList')) loadUsers();
    if (document.getElementById('ordersList')) loadOrders();
    if (document.getElementById('couponsList')) loadCoupons();
    if (document.getElementById('totalProducts')) loadDashboardData();
}

function closeProductModal() {
    document.getElementById('productModal').classList.add('hidden');
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('imagePreview').classList.add('hidden');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.add('hidden');
    deleteProductId = null;
}

function logout() {
    auth.signOut().then(() => {
        window.location.href = '/index.html';
    });
}

// Mobile menu toggle
document.getElementById('menuToggle')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// Close sidebar when clicking outside on mobile
document.addEventListener('click', (e) => {
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    if (window.innerWidth < 768 && sidebar.classList.contains('open')) {
        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
            sidebar.classList.remove('open');
        }
    }
});

// Product form submit
document.getElementById('productForm')?.addEventListener('submit', (e) => {
    e.preventDefault();
    if (document.getElementById('productId').value) {
        saveProduct();
    } else {
        addNewProduct();
    }
});
</script>

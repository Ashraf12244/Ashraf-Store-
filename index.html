<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>اشرف اسٹور - موبائل شاپنگ ایپ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto; background: #f8fafc; padding-bottom: 70px; }
        .bottom-nav { backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }
        .product-card:active { transform: scale(0.98); }
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="sticky top-0 z-50 bg-white shadow-md">
    <div class="px-4 py-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fas fa-store text-2xl text-blue-600"></i>
                <h1 class="text-xl font-bold">اشرف اسٹور</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="userAvatar" class="hidden">
                    <img id="avatarImg" class="w-8 h-8 rounded-full border-2 border-blue-500">
                </div>
                <button onclick="toggleAuth()" id="authBtn">
                    <i class="fas fa-user-circle text-2xl text-gray-600"></i>
                </button>
                <button onclick="openCart()" class="relative">
                    <i class="fas fa-shopping-cart text-2xl text-gray-600"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
        
        <!-- Search -->
        <div class="mt-3">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="تلاش کریں..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl bg-gray-50">
            </div>
            <div id="searchResults" class="absolute left-0 right-0 mt-1 bg-white shadow-xl rounded-xl z-50 hidden max-h-96 overflow-auto"></div>
        </div>
    </div>
</div>

<!-- CATEGORIES -->
<div class="px-4 py-3 overflow-x-auto">
    <div id="categories" class="flex gap-3">
        <div class="skeleton w-20 h-10 rounded-full"></div>
        <div class="skeleton w-20 h-10 rounded-full"></div>
        <div class="skeleton w-20 h-10 rounded-full"></div>
    </div>
</div>

<!-- BANNER -->
<div class="px-4 mb-5">
    <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl p-5 text-white">
        <h2 class="text-2xl font-bold">🔥 بڑی چھوٹ</h2>
        <p class="text-sm mb-3">50% تک کی چھوٹ منتخب آئٹمز پر</p>
        <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" class="bg-white text-blue-600 px-5 py-2 rounded-full text-sm font-semibold">ابھی خریدیں</button>
    </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="px-4 mb-20">
    <h2 class="text-lg font-bold mb-4">✨ نمایاں مصنوعات</h2>
    <div id="productsGrid" class="grid grid-cols-2 gap-4">
        <div class="skeleton h-64 rounded-xl"></div>
        <div class="skeleton h-64 rounded-xl"></div>
        <div class="skeleton h-64 rounded-xl"></div>
        <div class="skeleton h-64 rounded-xl"></div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/95 border-t bottom-nav">
    <div class="flex justify-around py-2">
        <button onclick="showHome()" id="navHome" class="flex flex-col items-center text-blue-600"><i class="fas fa-home text-xl"></i><span class="text-xs">ہوم</span></button>
        <button onclick="showShop()" id="navShop" class="flex flex-col items-center text-gray-500"><i class="fas fa-search text-xl"></i><span class="text-xs">تلاش</span></button>
        <button onclick="showOrders()" id="navOrders" class="flex flex-col items-center text-gray-500"><i class="fas fa-list text-xl"></i><span class="text-xs">آرڈرز</span></button>
        <button onclick="showProfile()" id="navProfile" class="flex flex-col items-center text-gray-500"><i class="fas fa-user text-xl"></i><span class="text-xs">پروفائل</span></button>
    </div>
</nav>

<!-- CART DRAWER -->
<div id="cartDrawer" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeCart()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-[80vh] overflow-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between">
            <h3 class="font-bold">میری کارٹ <span id="cartCount">(0)</span></h3>
            <button onclick="closeCart()"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="p-4"></div>
        <div id="cartFooter" class="p-4 border-t hidden">
            <div class="flex justify-between mb-3"><span>کل:</span><span id="cartTotal" class="font-bold text-blue-600">₹0</span></div>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white py-3 rounded-xl">آرڈر کریں</button>
        </div>
    </div>
</div>

<!-- CHECKOUT MODAL -->
<div id="checkoutModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeCheckout()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-4">
        <h3 class="font-bold mb-4">آرڈر کی تفصیلات</h3>
        <textarea id="address" rows="3" placeholder="اپنا پتہ لکھیں" class="w-full border rounded-xl p-3 mb-3"></textarea>
        <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-3 rounded-xl">آرڈر کنفرم کریں</button>
        <button onclick="closeCheckout()" class="w-full text-gray-500 py-2 mt-2">منسوخ</button>
    </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeLogin()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6">
        <h2 class="text-xl font-bold text-center mb-4">لاگ ان کریں</h2>
        <button onclick="loginWithGoogle()" class="w-full bg-red-600 text-white py-3 rounded-xl flex items-center justify-center gap-2 mb-3"><i class="fab fa-google"></i> گوگل سے لاگ ان</button>
        <input type="email" id="loginEmail" placeholder="ای میل" class="w-full border rounded-xl p-3 mb-3">
        <input type="password" id="loginPassword" placeholder="پاس ورڈ" class="w-full border rounded-xl p-3 mb-4">
        <button onclick="loginWithEmail()" class="w-full bg-blue-600 text-white py-3 rounded-xl">لاگ ان</button>
        <button onclick="closeLogin()" class="w-full text-gray-500 py-2 mt-2">منسوخ</button>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed top-20 right-4 left-4 z-50 flex flex-col items-end gap-2"></div>

<script>
// ============ FIREBASE CONFIG (آپ کی دی ہوئی) ============
const firebaseConfig = {
    apiKey: "AIzaSyDeonBkHpaKn84kG-7jQN3vXV5vV7g1dUY",
    authDomain: "sharifcom-45d95.firebaseapp.com",
    databaseURL: "https://sharifcom-45d95-default-rtdb.firebaseio.com",
    projectId: "sharifcom-45d95",
    storageBucket: "sharifcom-45d95.firebasestorage.app",
    messagingSenderId: "273914972899",
    appId: "1:273914972899:web:040c90d0e6b38ee864d3d6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ============ EMAILJS (آپ کی دی ہوئی) ============
emailjs.init({ publicKey: "DapdU3gPmJ8ymUdD2" });

// ============ GLOBAL ============
let currentUser = null;
let cart = {};
let products = [];

// ============ AUTH ============
auth.onAuthStateChanged((user) => {
    currentUser = user;
    if (user) {
        document.getElementById('userAvatar').classList.remove('hidden');
        document.getElementById('avatarImg').src = user.photoURL || 'https://ui-avatars.com/api/?background=3b82f6&color=fff&name=' + (user.displayName || 'User');
        document.getElementById('authBtn').innerHTML = '<i class="fas fa-sign-out-alt text-2xl text-gray-600"></i>';
        loadUserCart();
    } else {
        document.getElementById('userAvatar').classList.add('hidden');
        document.getElementById('authBtn').innerHTML = '<i class="fas fa-user-circle text-2xl text-gray-600"></i>';
        loadGuestCart();
    }
    updateCartBadge();
});

function toggleAuth() {
    if (currentUser) { auth.signOut(); showToast('لاگ آؤٹ ہو گئے'); location.reload(); }
    else { openLogin(); }
}

function loginWithGoogle() {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        .then(() => { closeLogin(); showToast('خوش آمدید!'); })
        .catch(e => showToast(e.message, 'error'));
}

function loginWithEmail() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    auth.signInWithEmailAndPassword(email, password)
        .then(() => { closeLogin(); showToast('لاگ ان کامیاب'); })
        .catch(() => showToast('غلط ای میل یا پاس ورڈ', 'error'));
}

function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }

// ============ CART ============
function loadUserCart() {
    db.ref(`carts/${currentUser.uid}`).on('value', (s) => {
        cart = {};
        s.forEach(c => { cart[c.key] = c.val(); });
        updateCartBadge();
        renderCart();
    });
}

function loadGuestCart() {
    const saved = localStorage.getItem('cart');
    cart = saved ? JSON.parse(saved) : {};
    updateCartBadge();
}

function saveGuestCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

function addToCart(id, name, price, img) {
    if (cart[id]) { cart[id].qty++; }
    else { cart[id] = { id, name, price, qty: 1, image: img }; }
    if (currentUser) { db.ref(`carts/${currentUser.uid}/${id}`).set(cart[id]); }
    else { saveGuestCart(); }
    updateCartBadge();
    showToast('کارٹ میں شامل!');
}

function removeFromCart(id) {
    delete cart[id];
    if (currentUser) { db.ref(`carts/${currentUser.uid}/${id}`).remove(); }
    else { saveGuestCart(); }
    updateCartBadge();
    renderCart();
}

function updateCartBadge() {
    const count = Object.keys(cart).length;
    document.getElementById('cartBadge').innerText = count;
}

function renderCart() {
    const container = document.getElementById('cartItems');
    const items = Object.values(cart);
    if (items.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-shopping-cart text-4xl mb-2"></i><p>کارٹ خالی ہے</p></div>';
        document.getElementById('cartFooter').classList.add('hidden');
        return;
    }
    let total = 0;
    container.innerHTML = items.map(i => {
        total += i.price * i.qty;
        return `<div class="flex gap-3 mb-4 border-b pb-3">
            <img src="${i.image || 'https://via.placeholder.com/60'}" class="w-16 h-16 rounded object-cover">
            <div class="flex-1"><p class="font-semibold">${i.name}</p><p class="text-blue-600">₹${i.price}</p></div>
            <div class="flex items-center gap-2"><button onclick="updateQty('${i.id}', ${i.qty-1})" class="w-7 h-7 rounded-full bg-gray-100">-</button><span>${i.qty}</span><button onclick="updateQty('${i.id}', ${i.qty+1})" class="w-7 h-7 rounded-full bg-gray-100">+</button></div>
            <button onclick="removeFromCart('${i.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
        </div>`;
    }).join('');
    document.getElementById('cartTotal').innerHTML = `₹${total}`;
    document.getElementById('cartFooter').classList.remove('hidden');
}

function updateQty(id, qty) {
    if (qty <= 0) { removeFromCart(id); return; }
    cart[id].qty = qty;
    if (currentUser) { db.ref(`carts/${currentUser.uid}/${id}`).set(cart[id]); }
    else { saveGuestCart(); }
    renderCart();
}

function openCart() { renderCart(); document.getElementById('cartDrawer').classList.remove('hidden'); }
function closeCart() { document.getElementById('cartDrawer').classList.add('hidden'); }

// ============ ORDER ============
function checkout() {
    if (!currentUser) { openLogin(); showToast('آرڈر کے لیے لاگ ان کریں', 'error'); return; }
    if (Object.keys(cart).length === 0) { showToast('کارٹ خالی ہے', 'error'); return; }
    closeCart();
    document.getElementById('checkoutModal').classList.remove('hidden');
}

function closeCheckout() { document.getElementById('checkoutModal').classList.add('hidden'); }

function placeOrder() {
    const address = document.getElementById('address').value;
    if (!address) { showToast('پتہ لکھیں', 'error'); return; }
    
    let total = 0;
    const items = Object.values(cart);
    items.forEach(i => total += i.price * i.qty);
    total += 50; // delivery
    
    const orderId = 'ORD' + Date.now();
    const order = {
        orderId, userId: currentUser.uid, userName: currentUser.displayName || currentUser.email,
        userEmail: currentUser.email, items, total, address, status: 'pending', createdAt: new Date().toISOString()
    };
    
    db.ref(`orders/${currentUser.uid}/${orderId}`).set(order).then(() => {
        // Email send
        emailjs.send('service_hwvi11g', 'template_kp1zovr', {
            to_email: currentUser.email, to_name: currentUser.displayName,
            order_id: orderId, total_amount: total,
            items: items.map(i => `${i.name} x${i.qty}`).join(', '),
            shipping_address: address
        }).catch(e => console.log('Email error:', e));
        
        // Clear cart
        db.ref(`carts/${currentUser.uid}`).remove();
        cart = {};
        updateCartBadge();
        closeCheckout();
        showToast('آرڈر ہو گیا! 📦');
        setTimeout(() => showOrders(), 1500);
    });
}

// ============ PRODUCTS ============
function loadProducts() {
    db.ref('products').on('value', (s) => {
        products = [];
        s.forEach(c => products.push({ id: c.key, ...c.val() }));
        displayProducts(products.slice(0, 8));
    });
}

function displayProducts(list) {
    const grid = document.getElementById('productsGrid');
    if (!list.length) { grid.innerHTML = '<div class="col-span-2 text-center py-10">کوئی پروڈکٹ نہیں</div>'; return; }
    grid.innerHTML = list.map(p => `
        <div class="bg-white rounded-xl shadow-sm overflow-hidden product-card">
            <img src="${p.image || 'https://via.placeholder.com/300'}" class="w-full h-40 object-cover" loading="lazy">
            <div class="p-3">
                <h3 class="font-semibold text-sm">${p.name}</h3>
                <div class="flex items-center justify-between mt-2">
                    <div><span class="text-blue-600 font-bold">₹${p.discount_price || p.price}</span>${p.discount_price ? `<span class="text-xs line-through text-gray-400 ml-1">₹${p.price}</span>` : ''}</div>
                    <button onclick="addToCart('${p.id}','${p.name}',${p.discount_price || p.price},'${p.image || ''}')" class="bg-blue-600 text-white p-2 rounded-lg"><i class="fas fa-cart-plus"></i></button>
                </div>
            </div>
        </div>
    `).join('');
}

function loadCategories() {
    db.ref('categories').on('value', (s) => {
        let html = '<button onclick="filterAll()" class="px-4 py-2 bg-blue-600 text-white rounded-full text-sm">سب</button>';
        s.forEach(c => { html += `<button onclick="filterCategory('${c.val().slug}')" class="px-4 py-2 bg-white rounded-full text-sm shadow-sm">${c.val().name}</button>`; });
        document.getElementById('categories').innerHTML = html;
    });
}

function filterAll() { displayProducts(products.slice(0, 8)); }
function filterCategory(cat) { displayProducts(products.filter(p => p.category === cat).slice(0, 8)); }

// ============ SEARCH ============
function setupSearch() {
    const input = document.getElementById('searchInput');
    const results = document.getElementById('searchResults');
    input.addEventListener('input', () => {
        const q = input.value.toLowerCase();
        if (q.length < 2) { results.classList.add('hidden'); return; }
        const filtered = products.filter(p => p.name.toLowerCase().includes(q));
        if (filtered.length) {
            results.innerHTML = filtered.slice(0, 5).map(p => `<a href="#" onclick="addToCart('${p.id}','${p.name}',${p.discount_price || p.price},'${p.image || ''}')" class="flex items-center gap-3 p-3 border-b"><img src="${p.image || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded"><div><div>${p.name}</div><div class="text-blue-600">₹${p.discount_price || p.price}</div></div></a>`).join('');
            results.classList.remove('hidden');
        } else { results.innerHTML = '<div class="p-3 text-gray-400">کوئی نہیں</div>'; results.classList.remove('hidden'); }
    });
}

// ============ UI ============
function showHome() { loadProducts(); updateNav('navHome'); window.scrollTo(0,0); }
function showShop() { filterAll(); updateNav('navShop'); }
function showOrders() { 
    if(!currentUser){ openLogin(); return; }
    showToast('آرڈرز جلد آ رہے ہیں');
    updateNav('navOrders');
}
function showProfile() { if(currentUser) showToast(currentUser.displayName || currentUser.email); else openLogin(); updateNav('navProfile'); }
function updateNav(active) {
    ['navHome','navShop','navOrders','navProfile'].forEach(id => {
        const el = document.getElementById(id);
        if(id === active) { el.classList.add('text-blue-600'); el.classList.remove('text-gray-500'); }
        else { el.classList.add('text-gray-500'); el.classList.remove('text-blue-600'); }
    });
}
function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    const toast = document.createElement('div');
    toast.className = `px-4 py-3 rounded-xl shadow-lg toast ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white mb-2`;
    toast.innerText = msg;
    t.appendChild(toast);
    setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(),300); }, 3000);
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', () => {
    loadProducts();
    loadCategories();
    setupSearch();
});

// ============ SAMPLE DATA (پہلی بار چلائیں) ============
function initSampleData() {
    const sampleProducts = [
        { name: "باسمتی چاول 5kg", price: 450, discount_price: 399, stock: 100, category: "groceries", rating: 4.5 },
        { name: "اسمارٹ فون", price: 15000, discount_price: 13999, stock: 50, category: "electronics", rating: 4.3 },
        { name: "مین ٹی شرٹ", price: 899, discount_price: 699, stock: 200, category: "clothing", rating: 4.2 },
        { name: "مکسر گرائنڈر", price: 3500, discount_price: 2999, stock: 40, category: "home", rating: 4.4 },
        { name: "چینی 1kg", price: 45, discount_price: 40, stock: 200, category: "groceries", rating: 4.0 },
        { name: "ککنگ آئل 1L", price: 120, discount_price: 110, stock: 150, category: "groceries", rating: 4.2 },
        { name: "وائرلیس ایئر بڈز", price: 1999, discount_price: 1499, stock: 100, category: "electronics", rating: 4.5 },
        { name: "ویمن جینز", price: 1299, discount_price: 999, stock: 150, category: "clothing", rating: 4.3 },
        { name: "نان اسٹک پین", price: 899, discount_price: 699, stock: 90, category: "home", rating: 4.1 },
        { name: "آرگینک آٹا 5kg", price: 280, discount_price: 250, stock: 80, category: "groceries", rating: 4.6 },
        { name: "لیپ ٹاپ", price: 45000, discount_price: 42999, stock: 30, category: "electronics", rating: 4.7 },
        { name: "اسمارٹ واچ", price: 2999, discount_price: 2499, stock: 75, category: "electronics", rating: 4.4 }
    ];
    const categories = [
        { name: "گروسری", slug: "groceries" },
        { name: "الیکٹرونکس", slug: "electronics" },
        { name: "کپڑے", slug: "clothing" },
        { name: "گھر کا سامان", slug: "home" }
    ];
    categories.forEach(c => db.ref('categories').push(c));
    sampleProducts.forEach(p => db.ref('products').push(p));
    showToast('نمونہ ڈیٹا لوڈ ہو گیا!');
}
// پہلی بار ڈیٹا ڈالنے کے لیے کنسول میں یہ چلائیں: initSampleData()
</script>
</body>
</html>
